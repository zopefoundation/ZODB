# Generated with zope.meta (https://zopemeta.readthedocs.io/) from:
# https://github.com/zopefoundation/meta/tree/master/src/zope/meta/pure-python
[tox]
minversion = 3.18
envlist =
    release-check
    lint
    py310
    py311
    py312
    py313
    py314
    pypy3
    docs
    coverage
    py310-pure

[testenv]
usedevelop = true
package = wheel
wheel_build_env = .pkg
deps =
    setuptools >= 78.1.1,< 81
setenv =
    ZOPE_INTERFACE_STRICT_IRO=1
commands =
    zope-testrunner --test-path=src -a 1000 {posargs:-vc}
extras =
    test

[testenv:py310-pure]
basepython = python3.10
setenv =
    PURE_PYTHON = 1

[testenv:setuptools-latest]
basepython = python3
deps =
    git+https://github.com/pypa/setuptools.git\#egg=setuptools

[testenv:release-check]
description = ensure that the distribution is ready to release
basepython = python3
skip_install = true
deps =
    setuptools >= 78.1.1,< 81
    wheel
    twine
    build
    check-manifest
    check-python-versions >= 0.20.0
    wheel
commands_pre =
commands =
    check-manifest
    check-python-versions --only pyproject.toml,setup.py,tox.ini,.github/workflows/tests.yml
    python -m build --sdist --no-isolation
    twine check dist/*

[testenv:lint]
description = This env runs all linters configured in .pre-commit-config.yaml
basepython = python3
skip_install = true
deps =
    pre-commit
commands_pre =
commands =
    pre-commit run --all-files --show-diff-on-failure

[testenv:docs]
basepython = python3
skip_install = false
extras =
    docs
commands_pre =
commands =
    sphinx-build -b html -d docs/_build/doctrees docs docs/_build/html

[testenv:coverage]
basepython = python3
allowlist_externals =
    mkdir
deps =
    coverage[toml]
commands =
    mkdir -p {toxinidir}/parts/htmlcov
    coverage run -m zope.testrunner --test-path=src {posargs:-vc}
    coverage html
    coverage report
